type Packaging {
  id: ID!
  code: String!
  name: String!
  type: String!
  capacity_value: Float
  capacity_unit: String
  material: String
  status: String!
  created_at: DateTime!
  updated_at: DateTime!
}

input CreatePackagingInput {
  code: String!
  name: String!
  type: String!
  capacity_value: Float
  capacity_unit: String
  material: String
  status: String = "ACTIVE"
}

input UpdatePackagingInput {
  name: String
  type: String
  capacity_value: Float
  capacity_unit: String
  material: String
  status: String
}

extend type Query {
  packagings: [Packaging!]!
    @paginate(model: "App\\Models\\Packaging", defaultCount: 10)

  packaging(id: ID! @eq): Packaging
    @find(model: "App\\Models\\Packaging")
}

extend type Mutation {
  createPackaging(input: CreatePackagingInput!): Packaging
    @field(resolver: "App\\GraphQL\\Mutations\\PackagingMutator@create")

  updatePackaging(id: ID!, input: UpdatePackagingInput!): Packaging
    @field(resolver: "App\\GraphQL\\Mutations\\PackagingMutator@update")

  deletePackaging(id: ID!): Packaging
    @field(resolver: "App\\GraphQL\\Mutations\\PackagingMutator@delete")

  restorePackaging(id: ID!): Packaging
    @field(resolver: "App\\GraphQL\\Mutations\\PackagingMutator@restore")

  forceDeletePackaging(id: ID!): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\PackagingMutator@forceDelete")
}